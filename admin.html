<!DOCTYPE html>
<html lang="en" class="h-full overflow-hidden select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RS SHOP - Control Console Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 font-sans flex flex-col antialiased">

    <div id="global-loader" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl flex flex-col items-center space-y-4">
            <div class="flex space-x-2">
                <div class="w-3 h-3 bg-violet-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                <div class="w-3 h-3 bg-violet-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-3 h-3 bg-violet-500 rounded-full animate-bounce"></div>
            </div>
            <p class="text-xs font-semibold text-slate-400 tracking-wider uppercase">Processing System Task...</p>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto h-full bg-slate-950 flex flex-col relative shadow-2xl overflow-hidden border-x border-slate-800">
        
        <header id="app-header" class="bg-slate-900 border-b border-slate-800 h-14 flex items-center justify-between px-4 sticky top-0 z-30 shrink-0">
            <div class="flex items-center space-x-3 w-full">
                <span class="text-xl font-black tracking-tight bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">RS CONTROL CONSOLE</span>
                <span class="text-[9px] bg-violet-500/20 text-violet-400 border border-violet-500/30 px-1.5 py-0.5 rounded-sm uppercase font-bold tracking-widest font-mono">Root</span>
            </div>
        </header>

        <main id="app-view-container" class="flex-1 overflow-y-auto no-scrollbar relative bg-slate-950 pb-16">
        </main>

        <nav id="app-bottom-nav" class="absolute bottom-0 left-0 right-0 h-16 bg-slate-900 border-t border-slate-800 grid grid-cols-6 items-center justify-items-center z-30 shrink-0 hidden px-1">
            <button onclick="router.navigate('admin-dashboard')" class="flex flex-col items-center text-violet-400"><i class="fa-solid fa-chart-pie text-lg mb-0.5"></i><span class="text-[9px] font-semibold scale-90">Dashboard</span></button>
            <button onclick="router.navigate('admin-categories')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-list text-lg mb-0.5"></i><span class="text-[9px] font-semibold scale-90">Categories</span></button>
            <button onclick="router.navigate('admin-inventory')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-boxes-stacked text-lg mb-0.5"></i><span class="text-[9px] font-semibold scale-90">Products</span></button>
            <button onclick="router.navigate('admin-orders')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-truck-ramp-box text-lg mb-0.5"></i><span class="text-[9px] font-semibold scale-90">Orders</span></button>
            <button onclick="router.navigate('admin-tickets')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-headset text-lg mb-0.5"></i><span class="text-[9px] font-semibold scale-90">Tickets</span></button>
            <button onclick="router.navigate('admin-settings')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-gears text-lg mb-0.5"></i><span class="text-[9px] font-semibold scale-90">Settings</span></button>
        </nav>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());

        const SEED_IMAGES = {
            phones: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%236366f1'><rect x='25' y='10' width='50' height='80' rx='8' fill='%234f46e5'/><circle cx='50' y='82' r='4' fill='white'/><rect x='30' y='18' width='40' height='55' fill='%23e0e7ff'/></svg>",
            laptops: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='25' width='70' height='45' rx='4' fill='%23475569'/><rect x='20' y='30' width='60' height='35' fill='%23f1f5f9'/><path d='M5 70 H95 L90 76 H10 Z' fill='%23334155'/></svg>",
            generic_cat: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23a78bfa'><path d='M20 20h25v25H20zm35 0h25v25H55zM20 55h25v25H20zm35 0h25v25H55z'/></svg>"
        };

        window.uploadedImagesBase64 = [];
        window.uploadedCategoryImageBase64 = null;

        class LocalDatabaseEngine {
            constructor() { this.initTables(); }
            initTables() {
                if(!localStorage.getItem('rs_users')) localStorage.setItem('rs_users', JSON.stringify([]));
                if(!localStorage.getItem('rs_admin')) localStorage.setItem('rs_admin', JSON.stringify({username: "admin", password: "123"}));
                if(!localStorage.getItem('rs_categories')) {
                    localStorage.setItem('rs_categories', JSON.stringify([
                        {id: 1, name: "Smartphones", image: SEED_IMAGES.phones},
                        {id: 2, name: "Laptops", image: SEED_IMAGES.laptops}
                    ]));
                }
                if(!localStorage.getItem('rs_products')) {
                    localStorage.setItem('rs_products', JSON.stringify([
                        {id: 101, cat_id: 1, name: "iPhone 15 Pro Max", short_desc: "Premium Titanium Build with dynamic island design layout.", long_desc: "Detailed with 256GB storage arrays.", price: 145000, stock: 10, images: [SEED_IMAGES.phones], code: "IPH15PM"},
                        {id: 102, cat_id: 2, name: "MacBook Pro M3", short_desc: "Extreme Performance Laptop built for systems developers.", long_desc: "Includes 16GB integrated system data cache modules.", price: 245000, stock: 5, images: [SEED_IMAGES.laptops], code: "MBPM3"}
                    ]));
                }
                if(!localStorage.getItem('rs_orders')) localStorage.setItem('rs_orders', JSON.stringify([]));
                if(!localStorage.getItem('rs_tickets')) localStorage.setItem('rs_tickets', JSON.stringify([]));
                if(!localStorage.getItem('rs_session_admin')) localStorage.setItem('rs_session_admin', null);
            }
            getData(key) { return JSON.parse(localStorage.getItem(key)); }
            setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            ajaxRequest(action, callback) {
                document.getElementById('global-loader').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('global-loader').classList.add('hidden');
                    try { const response = action(); callback({ success: true, data: response }); }
                    catch (err) { callback({ success: false, error: err.message }); }
                }, 350);
            }
            logoutAdmin() { this.setData('rs_session_admin', null); router.navigate('admin-login'); }
        }
        const db = new LocalDatabaseEngine();

        class AppRouter {
            constructor() {
                this.views = {};
                window.addEventListener('popstate', (e) => { if(e.state) this.renderView(e.state.view, e.state.param, false); });
            }
            register(viewId, template) { this.views[viewId] = template; }
            navigate(viewId, param = null) { this.renderView(viewId, param, true); }
            renderView(viewId, param, pushHistory = true) {
                const activeAdmin = db.getData('rs_session_admin');
                if (!activeAdmin && viewId !== 'admin-login') viewId = 'admin-login';

                const nav = document.getElementById('app-bottom-nav');
                if(viewId === 'admin-login') nav.classList.add('hidden'); else nav.classList.remove('hidden');

                const navButtons = nav.querySelectorAll('button');
                navButtons.forEach(btn => {
                    if (btn.getAttribute('onclick').includes(viewId)) {
                        btn.classList.remove('text-slate-500'); btn.classList.add('text-violet-400');
                    } else {
                        btn.classList.remove('text-violet-400'); btn.classList.add('text-slate-500');
                    }
                });

                if (this.views[viewId]) {
                    if(pushHistory) window.history.pushState({view: viewId, param: param}, '', `#${viewId}`);
                    document.getElementById('app-view-container').innerHTML = this.views[viewId](param);
                    
                    if(viewId === 'admin-inventory') { bindImageUploadEngine(); }
                    if(viewId === 'admin-categories') { bindCategoryImageUploadEngine(); }
                }
            }
        }
        const router = new AppRouter();
    </script>

    <script>
        // GATEWAY LOGIN MODULE
        router.register('admin-login', () => `
            <div class="p-6 flex flex-col justify-center min-h-[75vh]">
                <div class="text-center mb-8">
                    <div class="w-12 h-12 bg-violet-500/10 border border-violet-500/20 text-violet-400 rounded-2xl flex items-center justify-center mx-auto mb-3 text-xl"><i class="fa-solid fa-terminal"></i></div>
                    <h2 class="text-xl font-black text-slate-100">Control System Authentication</h2>
                    <p class="text-xs text-slate-500">Authorized Personnel Node Access Only</p>
                </div>
                <form onsubmit="event.preventDefault(); verifyAdminCredentials();" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Console Operator Username</label>
                        <input type="text" id="ad-user" required class="w-full h-11 px-4 bg-slate-900 border border-slate-800 rounded-xl text-sm text-slate-100 focus:outline-none focus:border-violet-500" placeholder="Username">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Node Password</label>
                        <input type="password" id="ad-pass" required class="w-full h-11 px-4 bg-slate-900 border border-slate-800 rounded-xl text-sm text-slate-100 focus:outline-none focus:border-violet-500" placeholder="••••••••">
                    </div>
                    <button class="w-full h-11 bg-violet-600 text-slate-100 font-bold rounded-xl text-xs uppercase shadow-lg shadow-violet-600/10 active:scale-95 transition tracking-widest pt-0.5">Initialize Mount</button>
                </form>
            </div>
        `);

        window.verifyAdminCredentials = () => {
            const user = document.getElementById('ad-user').value;
            const pass = document.getElementById('ad-pass').value;
            db.ajaxRequest(() => {
                const schema = db.getData('rs_admin');
                if (schema.username !== user || schema.password !== pass) throw new Error("Administrative System Handshake Refused.");
                db.setData('rs_session_admin', { token: "ADM_ACTIVE_NODE", session: Date.now() });
            }, (res) => { if(res.success) router.navigate('admin-dashboard'); else alert(res.error); });
        };

        // ANALYTICAL METRICS CONTROL DASHBOARD
        router.register('admin-dashboard', () => {
            const orders = db.getData('rs_orders') || [];
            const categories = db.getData('rs_categories') || [];
            const products = db.getData('rs_products') || [];
            const users = db.getData('rs_users') || [];
            
            const grossSales = orders.reduce((acc, o) => {
                const rawAmount = o.amount || o.totalPrice || o.subtotal || o.price || 0;
                return acc + (parseFloat(rawAmount) || 0);
            }, 0);

            return `
                <div class="p-4 space-y-4">
                    <div class="flex justify-between items-center bg-slate-900 p-4 border border-slate-800 rounded-2xl">
                        <div>
                            <h4 class="text-xs font-bold text-slate-400">System Handshake</h4>
                            <p class="text-[10px] text-emerald-400 font-mono mt-0.5"><span class="w-1.5 h-1.5 inline-block bg-emerald-500 rounded-full animate-ping mr-1"></span> node_online_verified</p>
                        </div>
                        <button onclick="db.logoutAdmin()" class="px-3 h-8 border border-rose-500/30 bg-rose-500/10 text-rose-400 rounded-xl font-bold text-[10px] uppercase tracking-wider">Unmount</button>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-900 border border-slate-800 p-3.5 rounded-2xl flex flex-col justify-between">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Gross Revenue</span>
                            <div class="text-lg font-black text-emerald-400 font-mono mt-2">৳${grossSales.toLocaleString()}</div>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-3.5 rounded-2xl flex flex-col justify-between">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Orders</span>
                            <div class="text-lg font-black text-violet-400 font-mono mt-2">${orders.length}</div>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-3.5 rounded-2xl flex flex-col justify-between">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Categories</span>
                            <div class="text-lg font-black text-pink-400 font-mono mt-2">${categories.length} Nodes</div>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-3.5 rounded-2xl flex flex-col justify-between">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Product Catalog</span>
                            <div class="text-lg font-black text-amber-400 font-mono mt-2">${products.length} SKUs</div>
                        </div>
                    </div>
                </div>
            `;
        });

        // NEW: CATEGORY MANAGEMENT PIPELINE MODULE
        router.register('admin-categories', () => {
            const categories = db.getData('rs_categories') || [];
            window.uploadedCategoryImageBase64 = null;

            return `
                <div class="p-4 space-y-4">
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-1">
                            <span id="cat-form-intent-header" class="text-[10px] font-black text-pink-400 uppercase tracking-wider block">Inject New Category Node</span>
                        </div>
                        
                        <form onsubmit="event.preventDefault(); commitCategoryToEngine();" class="space-y-3">
                            <input type="text" id="c-name" required class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-pink-500" placeholder="Category Name (e.g. Gadgets)">
                            
                            <div>
                                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 px-1">Category Avatar Vector/Image</label>
                                <div class="relative w-full h-10 bg-slate-950 border border-slate-800 rounded-xl flex items-center px-3 cursor-pointer hover:border-slate-700 transition">
                                    <i class="fa-solid fa-folder-plus text-slate-500 mr-2 text-xs"></i>
                                    <span id="cat-img-label" class="text-xs text-slate-400 select-none">Select file...</span>
                                    <input type="file" id="c-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                                </div>
                                <div id="cat-image-preview" class="mt-2 hidden">
                                    <div class="relative w-12 h-12 bg-slate-950 border border-slate-800 rounded-lg p-0.5 overflow-hidden">
                                        <img id="cat-preview-img" src="" class="w-full h-full object-cover rounded">
                                    </div>
                                </div>
                            </div>
                            
                            <button id="cat-submit-btn" class="w-full h-10 bg-pink-600 text-slate-100 font-bold text-xs rounded-xl uppercase tracking-wider shadow-md shadow-pink-600/10 active:scale-95 transition">Commit Category Payload</button>
                        </form>
                    </div>

                    <div class="space-y-3">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-wider px-1 block">Active Categories Stack (${categories.length})</span>
                        ${categories.map(c => `
                            <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 bg-slate-950 border border-slate-800 rounded-lg p-1 flex items-center justify-center overflow-hidden shrink-0">
                                        <img src="${c.image || SEED_IMAGES.generic_cat}" class="w-full h-full object-cover rounded">
                                    </div>
                                    <div>
                                        <h4 class="text-xs font-bold text-slate-200">${c.name}</h4>
                                        <span class="text-[9px] text-slate-500 font-mono">ID: #${c.id}</span>
                                    </div>
                                </div>
                                <button onclick="purgeCategoryNode(${c.id})" class="text-rose-400 p-2 hover:bg-rose-500/10 rounded-xl transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });

        window.bindCategoryImageUploadEngine = () => {
            const inputEl = document.getElementById('c-image');
            if(!inputEl) return;
            inputEl.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(!file || !file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = function(evt) {
                    window.uploadedCategoryImageBase64 = evt.target.result;
                    document.getElementById('cat-preview-img').src = evt.target.result;
                    document.getElementById('cat-image-preview').classList.remove('hidden');
                    document.getElementById('cat-img-label').innerText = file.name;
                };
                reader.readAsDataURL(file);
            });
        };

        window.commitCategoryToEngine = () => {
            const nameVal = document.getElementById('c-name').value.trim();
            if(!nameVal) return;

            db.ajaxRequest(() => {
                let categories = db.getData('rs_categories') || [];
                const finalImg = window.uploadedCategoryImageBase64 || SEED_IMAGES.generic_cat;
                
                const newCat = {
                    id: Date.now(),
                    name: nameVal,
                    image: finalImg
                };
                categories.push(newCat);
                db.setData('rs_categories', categories);
            }, () => {
                router.navigate('admin-categories');
            });
        };

        window.purgeCategoryNode = (id) => {
            if(!confirm("Are you sure you want to drop this Category registry entity? This may affect items tied to this ID.")) return;
            db.ajaxRequest(() => {
                let categories = db.getData('rs_categories') || [];
                categories = categories.filter(c => c.id !== id);
                db.setData('rs_categories', categories);
            }, () => {
                router.navigate('admin-categories');
            });
        };

        // CENTRAL LOGISTICS ORDER PIPELINE
        router.register('admin-orders', () => {
            const orders = db.getData('rs_orders') || [];
            if(orders.length === 0) return `<div class="p-12 text-center text-xs text-slate-500"><i class="fa-solid fa-folder-open block text-2xl mb-2 text-slate-700"></i>Logistics Ledger Empty</div>`;
            return `
                <div class="p-4 space-y-3">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider px-1">Pipeline Order Management Matrix</h3>
                    ${orders.map(o => {
                        const calculatedCost = o.amount || o.totalPrice || o.subtotal || o.price || 0;
                        return `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                            <div class="flex justify-between items-center text-xs font-bold border-b border-slate-800 pb-2">
                                <span class="font-mono text-slate-300">ID: #${o.id || 'TEMP-ID'}</span>
                                <select onchange="updateLogisticsState(${o.id}, this.value)" class="h-7 px-2 bg-slate-950 border border-slate-800 text-[10px] text-violet-400 font-bold rounded-lg focus:outline-none">
                                    <option value="Placed" ${o.status==='Placed'?'selected':''}>Placed</option>
                                    <option value="Dispatched" ${o.status==='Dispatched'?'selected':''}>Dispatched</option>
                                    <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                </select>
                            </div>
                            <div class="text-xs space-y-1 text-slate-400 font-medium">
                                <div>Client: <span class="text-slate-200 font-bold">${o.user_name || o.name || 'Walk-in Client'}</span> (${o.phone || 'N/A'})</div>
                                <div class="truncate">Address: <span class="text-slate-300 font-mono text-[11px]">${o.address || 'Default Dropzone'}</span></div>
                            </div>
                            <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800/80 space-y-1">
                                ${(o.items || o.cart || []).map(i => `<div class="text-[10px] text-slate-400 flex justify-between font-medium"><span>• ${i.name || 'Product Unit'}</span><span class="font-mono text-slate-300">x${i.qty || i.quantity || 1}</span></div>`).join('')}
                            </div>
                            <div class="flex justify-between items-center pt-1">
                                <span class="text-[10px] text-slate-500 font-mono">${o.date || 'Recent'}</span>
                                <span class="text-sm font-black text-emerald-400 font-mono">৳${(parseFloat(calculatedCost) || 0).toLocaleString()}</span>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `;
        });

        window.updateLogisticsState = (id, newState) => {
            db.ajaxRequest(() => {
                let orders = db.getData('rs_orders');
                let match = orders.find(o => o.id === id);
                if(match) match.status = newState;
                db.setData('rs_orders', orders);
            }, () => router.navigate('admin-orders'));
        };

        // INVENTORY CATALOG SYSTEM 
        router.register('admin-inventory', () => {
            const categories = db.getData('rs_categories') || [];
            const products = db.getData('rs_products') || [];
            window.uploadedImagesBase64 = [];

            return `
                <div class="p-4 space-y-4">
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-1">
                            <span id="form-intent-header" class="text-[10px] font-black text-violet-400 uppercase tracking-wider block">Inject New Product Item Node</span>
                            <button id="cancel-edit-btn" onclick="resetInventoryFormState()" class="hidden text-[9px] text-rose-400 font-bold uppercase tracking-widest bg-rose-500/10 border border-rose-500/20 px-2 py-0.5 rounded">Cancel Mod</button>
                        </div>
                        
                        <form onsubmit="event.preventDefault(); commitProductToEngine();" class="space-y-3">
                            <input type="hidden" id="p-target-id" value="">
                            <input type="text" id="p-name" required class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-violet-500" placeholder="Product Label (Name)">
                            
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="p-price" required class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-violet-500" placeholder="Price Matrix (৳)">
                                <input type="number" id="p-stock" required class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-violet-500" placeholder="Inventory Units">
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <select id="p-cat" class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-400 focus:outline-none focus:border-violet-500">
                                    ${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                                </select>
                                <input type="text" id="p-code" required class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-violet-500" placeholder="SKU Code">
                            </div>

                            <div>
                                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 px-1">Upload Product Images (Multiple allowed)</label>
                                <div class="relative w-full h-10 bg-slate-950 border border-slate-800 rounded-xl flex items-center px-3 cursor-pointer hover:border-slate-700 transition">
                                    <i class="fa-solid fa-images text-slate-500 mr-2 text-xs"></i>
                                    <span class="text-xs text-slate-400 select-none">Select files...</span>
                                    <input type="file" id="p-images" multiple accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                                </div>
                                <div id="image-preview-deck" class="flex flex-wrap gap-2 mt-2"></div>
                            </div>

                            <div>
                                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 px-1">Short Context Snippet Description</label>
                                <textarea id="p-short-desc" required class="w-full p-3 h-14 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 resize-none focus:outline-none focus:border-violet-500" placeholder="Appears on item preview modules..."></textarea>
                            </div>

                            <div>
                                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 px-1">Deep-Dive Long Technical Specifications</label>
                                <textarea id="p-long-desc" required class="w-full p-3 h-24 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 resize-none focus:outline-none focus:border-violet-500" placeholder="Comprehensive detail parameters configuration blueprint..."></textarea>
                            </div>
                            
                            <button id="form-submit-btn" class="w-full h-10 bg-violet-600 text-slate-100 font-bold text-xs rounded-xl uppercase tracking-wider shadow-md shadow-violet-600/10 active:scale-95 transition">Commit Stock Payload</button>
                        </form>
                    </div>

                    <div class="space-y-3">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-wider px-1 block">Active Catalog Registry Stack (${products.length})</span>
                        ${products.map(p => {
                            const imageGallery = p.images || (p.image ? [p.image] : [SEED_IMAGES.phones]);
                            const matchedCat = categories.find(c => c.id === parseInt(p.cat_id));
                            const catName = matchedCat ? matchedCat.name : "Unknown Context";
                            
                            return `
                            <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex flex-col space-y-2.5">
                                <div class="flex justify-between items-start">
                                    <div class="flex items-start space-x-3 min-w-0 w-full">
                                        <div class="flex flex-col space-y-1 shrink-0">
                                            <div class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-lg p-1 flex items-center justify-center overflow-hidden">
                                                <img src="${imageGallery[0]}" class="w-full h-full object-cover rounded">
                                            </div>
                                            ${imageGallery.length > 1 ? `<span class="text-[8px] bg-slate-950 text-violet-400 font-bold px-1 py-0.5 rounded text-center border border-slate-800">+${imageGallery.length - 1} Images</span>` : ''}
                                        </div>
                                        <div class="min-w-0 flex-1">
                                            <h4 class="text-xs font-bold text-slate-200 truncate">${p.name}</h4>
                                            <div class="text-[10px] font-mono font-medium text-slate-500 mt-0.5">SKU: <span class="text-slate-400">${p.code}</span> | Price: <span class="text-violet-400">৳${p.price.toLocaleString()}</span> | Units: <span class="text-amber-400">${p.stock}</span></div>
                                            <div class="text-[9px] bg-slate-950 text-slate-400 inline-block px-1.5 py-0.5 rounded border border-slate-800/80 mt-1 font-semibold uppercase tracking-wider">Cat: ${catName}</div>
                                            <div class="flex gap-1 mt-1.5 overflow-x-auto no-scrollbar">
                                                ${imageGallery.map(img => `<img src="${img}" class="w-5 h-5 object-cover rounded border border-slate-800/80 bg-slate-950/40">`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex space-x-1 shrink-0">
                                        <button onclick="triggerProductEditEngine(${p.id})" class="text-indigo-400 p-2 hover:bg-indigo-500/10 rounded-xl transition"><i class="fa-solid fa-pen-to-square text-xs"></i></button>
                                        <button onclick="purgeProductNode(${p.id})" class="text-rose-400 p-2 hover:bg-rose-500/10 rounded-xl transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                                    </div>
                                </div>
                                
                                <div class="bg-slate-950/50 p-2 rounded-xl border border-slate-800/60 space-y-1.5 text-[11px]">
                                    <div class="text-slate-400 leading-snug"><span class="text-[9px] font-bold text-slate-600 uppercase tracking-wide block">Short Meta:</span>${p.short_desc || p.description || 'N/A'}</div>
                                    <div class="text-slate-500 leading-normal border-t border-slate-900 pt-1.5"><span class="text-[9px] font-bold text-slate-600 uppercase tracking-wide block">Long Parameters Specification:</span>${p.long_desc || 'N/A'}</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `;
        });

        window.bindImageUploadEngine = () => {
            const inputEl = document.getElementById('p-images');
            if(!inputEl) return;

            inputEl.addEventListener('change', function(e) {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if(!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        const base64Data = evt.target.result;
                        window.uploadedImagesBase64.push(base64Data);
                        renderLivePreviewDeck();
                    };
                    reader.readAsDataURL(file);
                });
                inputEl.value = '';
            });
        };

        window.renderLivePreviewDeck = () => {
            const deck = document.getElementById('image-preview-deck');
            if(!deck) return;
            deck.innerHTML = '';
            window.uploadedImagesBase64.forEach((imgData, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = "relative w-12 h-12 bg-slate-950 border border-slate-800 rounded-lg p-0.5 overflow-hidden group";
                wrapper.innerHTML = `
                    <img src="${imgData}" class="w-full h-full object-cover rounded">
                    <button type="button" onclick="removeSelectedImageNode(${idx})" class="absolute inset-0 bg-rose-950/80 text-rose-400 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-150 text-[10px]">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                deck.appendChild(wrapper);
            });
        };

        window.removeSelectedImageNode = (index) => {
            window.uploadedImagesBase64.splice(index, 1);
            renderLivePreviewDeck();
        };

        window.triggerProductEditEngine = (id) => {
            const products = db.getData('rs_products') || [];
            const target = products.find(p => p.id === id);
            if (!target) return;

            document.getElementById('p-target-id').value = target.id;
            document.getElementById('p-name').value = target.name;
            document.getElementById('p-price').value = target.price;
            document.getElementById('p-stock').value = target.stock;
            document.getElementById('p-cat').value = target.cat_id;
            document.getElementById('p-code').value = target.code;
            document.getElementById('p-short-desc').value = target.short_desc || target.description || '';
            document.getElementById('p-long-desc').value = target.long_desc || '';

            window.uploadedImagesBase64 = target.images ? [...target.images] : (target.image ? [target.image] : []);
            renderLivePreviewDeck();

            document.getElementById('form-intent-header').innerText = "Refactor Product Package Engine Data";
            document.getElementById('form-submit-btn').innerText = "Apply Registry Modifications";
            document.getElementById('form-submit-btn').classList.replace('bg-violet-600', 'bg-indigo-600');
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            document.getElementById('app-view-container').scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetInventoryFormState = () => {
            const form = document.querySelector('form');
            if(form) form.reset();
            document.getElementById('p-target-id').value = "";
            window.uploadedImagesBase64 = [];
            renderLivePreviewDeck();
            document.getElementById('form-intent-header').innerText = "Inject New Product Item Node";
            document.getElementById('form-submit-btn').innerText = "Commit Stock Payload";
            document.getElementById('form-submit-btn').classList.replace('bg-indigo-600', 'bg-violet-600');
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        window.commitProductToEngine = () => {
            db.ajaxRequest(() => {
                let products = db.getData('rs_products');
                const targetIdStr = document.getElementById('p-target-id').value;
                const cat_id = parseInt(document.getElementById('p-cat').value);
                const shortDescVal = document.getElementById('p-short-desc').value;
                const longDescVal = document.getElementById('p-long-desc').value;
                const nameVal = document.getElementById('p-name').value;
                const priceVal = parseFloat(document.getElementById('p-price').value) || 0;
                const stockVal = parseInt(document.getElementById('p-stock').value) || 0;
                const codeVal = document.getElementById('p-code').value.toUpperCase();
                
                const fallbackImg = SEED_IMAGES.generic_cat;
                const finalImagesArray = window.uploadedImagesBase64.length > 0 ? window.uploadedImagesBase64 : [fallbackImg];

                if (targetIdStr) {
                    const targetId = parseInt(targetIdStr);
                    products = products.map(p => {
                        if (p.id === targetId) {
                            return { ...p, cat_id, name: nameVal, price: priceVal, stock: stockVal, code: codeVal, short_desc: shortDescVal, description: shortDescVal, long_desc: longDescVal, images: finalImagesArray };
                        }
                        return p;
                    });
                } else {
                    const newProd = { id: Date.now(), cat_id: cat_id, name: nameVal, description: shortDescVal, short_desc: shortDescVal, long_desc: longDescVal, price: priceVal, stock: stockVal, images: finalImagesArray, code: codeVal };
                    products.push(newProd);
                }
                db.setData('rs_products', products);
            }, () => {
                resetInventoryFormState();
                router.navigate('admin-inventory');
            });
        };

        window.purgeProductNode = (id) => {
            if(!confirm("Are you sure you want to drop this stock array entity from database?")) return;
            db.ajaxRequest(() => {
                let products = db.getData('rs_products');
                products = products.filter(p => p.id !== id);
                db.setData('rs_products', products);
            }, () => {
                resetInventoryFormState();
                router.navigate('admin-inventory');
            });
        };

        // ADMIN SUPPORT TICKET RESOLUTION & LIVE REPLY MODULE
        router.register('admin-tickets', () => {
            const tickets = db.getData('rs_tickets') || [];
            if(tickets.length === 0) return `<div class="p-12 text-center text-xs text-slate-500"><i class="fa-solid fa-clipboard-check block text-2xl mb-2 text-slate-700"></i>No Active Open Issues Logged</div>`;
            return `
                <div class="p-4 space-y-3">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider px-1">Customer Service Ticket Logs</h3>
                    ${tickets.map(t => {
                        const replies = t.replies || [];
                        return `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                            <div class="flex justify-between items-center text-[11px] font-bold border-b border-slate-800 pb-2">
                                <span class="text-violet-400 bg-violet-500/10 border border-violet-500/20 px-2 py-0.5 rounded">${t.subject || 'Support Query'}</span>
                                <span class="text-slate-500 font-mono text-[9px]">${t.date || 'Just now'}</span>
                            </div>
                            
                            <div class="space-y-1">
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-wide block">Customer Message</span>
                                <p class="text-xs text-slate-300 bg-slate-950 p-2.5 rounded-xl border border-slate-800/60 leading-normal">${t.message}</p>
                            </div>

                            ${replies.length > 0 ? `
                                <div class="space-y-1.5 pt-1">
                                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-wide block">Response Thread Logs</span>
                                    <div class="space-y-2 max-h-40 overflow-y-auto no-scrollbar bg-slate-950/50 p-2 rounded-xl border border-slate-800/50">
                                        ${replies.map(r => `
                                            <div class="bg-slate-900 border border-slate-800/80 p-2 rounded-lg text-[11px]">
                                                <div class="flex justify-between items-center mb-1 text-[8px] font-mono font-bold text-violet-400">
                                                    <span>Console Operator (Admin)</span>
                                                    <span class="text-slate-500">${r.date}</span>
                                                </div>
                                                <p class="text-slate-300 leading-relaxed">${r.msg}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}

                            <div class="pt-1 space-y-1.5">
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-wide block">Draft Console Response</span>
                                <div class="flex items-center space-x-2">
                                    <input type="text" id="reply-input-${t.id}" onkeydown="if(event.key === 'Enter') sendTicketReplyNode(${t.id})" class="flex-1 h-9 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-violet-500" placeholder="Type response and dispatch...">
                                    <button onclick="sendTicketReplyNode(${t.id})" class="h-9 w-9 bg-violet-600 text-slate-100 rounded-xl flex items-center justify-center active:scale-95 transition text-xs shadow-md shadow-violet-600/10">
                                        <i class="fa-solid fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="flex justify-end pt-2 border-t border-slate-800/60 mt-1">
                                <button onclick="dismissTicket(${t.id})" class="h-7 px-3 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 font-bold text-[10px] rounded-lg transition active:scale-95">Resolve / Close Ticket</button>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `;
        });

        // DISPATCH ENGINE FUNCTION
        window.sendTicketReplyNode = (id) => {
            const inputField = document.getElementById(`reply-input-${id}`);
            const replyMsg = inputField ? inputField.value.trim() : "";
            if (!replyMsg) return;

            db.ajaxRequest(() => {
                let tickets = db.getData('rs_tickets') || [];
                let match = tickets.find(t => t.id === id);
                if (match) {
                    if (!match.replies) match.replies = [];
                    const now = new Date();
                    const timestampStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

                    match.replies.push({ id: Date.now(), msg: replyMsg, date: timestampStr });
                }
                db.setData('rs_tickets', tickets);
            }, () => {
                if (inputField) inputField.value = "";
                router.navigate('admin-tickets');
            });
        };

        window.dismissTicket = (id) => {
            if(!confirm("Mark this user support issue ticket as resolved and drop from log pipeline?")) return;
            db.ajaxRequest(() => {
                let tickets = db.getData('rs_tickets') || [];
                tickets = tickets.filter(t => t.id !== id);
                db.setData('rs_tickets', tickets);
            }, () => router.navigate('admin-tickets'));
        };

        // SYSTEM ENVIRONMENT AND ACCESS CONTROL CONFIGURATION MODULE
        router.register('admin-settings', () => {
            const adminCredentials = db.getData('rs_admin') || { username: "admin", password: "123" };
            
            return `
                <div class="p-4 space-y-4">
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                        <div class="border-b border-slate-800 pb-2 mb-1">
                            <span class="text-[10px] font-black text-amber-400 uppercase tracking-wider block">Access Control Node Configuration</span>
                            <p class="text-[10px] text-slate-500 mt-0.5">Modify base system authentication parameters for console terminal connectivity.</p>
                        </div>
                        
                        <form onsubmit="event.preventDefault(); commitSystemCredentials();" class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 px-1">Operator Username</label>
                                <input type="text" id="sys-user" required value="${adminCredentials.username}" class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-amber-500">
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 px-1">New Node Password</label>
                                <input type="password" id="sys-pass" required value="${adminCredentials.password}" class="w-full h-10 px-3 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 focus:outline-none focus:border-amber-500" placeholder="••••••••">
                            </div>
                            
                            <button class="w-full h-10 bg-amber-600 text-slate-100 font-bold text-xs rounded-xl uppercase tracking-wider shadow-md shadow-amber-600/10 active:scale-95 transition mt-2">
                                Commit Credentials Payload
                            </button>
                        </form>
                    </div>

                    <div class="bg-slate-900/40 border border-slate-800/60 p-3 rounded-xl text-[10px] text-slate-500 space-y-1">
                        <div class="font-bold uppercase tracking-wide text-slate-400"><i class="fa-solid fa-triangle-exclamation text-amber-500/80 mr-1"></i> Security Lifecycle Warning</div>
                        <p class="leading-normal">Altering credentials directly targets local web storage variables. Current security session validation tags are immediately compromised; active node operators must supply matching registration factors upon consecutive verification handshakes.</p>
                    </div>
                </div>
            `;
        });

        // SYSTEM STORAGE CREDENTIAL WRITER
        window.commitSystemCredentials = () => {
            const userVal = document.getElementById('sys-user').value.trim();
            const passVal = document.getElementById('sys-pass').value;

            if(!userVal || !passVal) return;

            db.ajaxRequest(() => {
                db.setData('rs_admin', {
                    username: userVal,
                    password: passVal
                });
            }, (res) => {
                if(res.success) {
                    alert("Administrative security keys successfully updated. Resetting console connection terminal context.");
                    db.logoutAdmin(); 
                } else {
                    alert("Error processing environmental matrix values rewrite.");
                }
            });
        };

        router.navigate('admin-login');
    </script>
</body>
</html>
